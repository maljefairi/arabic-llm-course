<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="'Segoe UI',Tahoma,'Noto Kufi Arabic','Cairo',sans-serif">
  <rect width="1000" height="460" fill="#0f1117"/>
  <text x="500" y="40" text-anchor="middle" direction="rtl" font-size="24" font-weight="700" fill="#fff">محسّن Muon مقابل AdamW — ~2× كفاءة حسابية</text>
  <text x="500" y="66" text-anchor="middle" font-size="13" fill="#9aa3b2">تعامد التدرّج (Newton-Schulz) يعامل الأوزان كمصفوفات ذات بنية هندسية</text>

  <!-- chart: loss vs compute -->
  <line x1="90" y1="360" x2="620" y2="360" stroke="#2a2f3e" stroke-width="1.5"/>
  <line x1="90" y1="120" x2="90" y2="360" stroke="#2a2f3e" stroke-width="1.5"/>
  <text x="355" y="392" text-anchor="middle" font-size="12" fill="#9aa3b2">الحساب (FLOPs) →</text>
  <text x="70" y="240" text-anchor="middle" font-size="12" fill="#9aa3b2" transform="rotate(-90 70 240)">الخسارة ↓</text>

  <!-- AdamW curve (higher/slower) -->
  <path d="M100,150 C200,250 360,300 600,330" fill="none" stroke="#ff8a8a" stroke-width="3"/>
  <text x="610" y="330" font-size="12" fill="#ff8a8a">AdamW</text>
  <!-- Muon curve (reaches same loss at ~half compute) -->
  <path d="M100,150 C160,260 250,305 340,330" fill="none" stroke="#7ee0a8" stroke-width="3"/>
  <text x="350" y="324" font-size="12" fill="#7ee0a8">Muon</text>
  <!-- 2x marker -->
  <line x1="340" y1="330" x2="600" y2="330" stroke="#fbbf24" stroke-dasharray="4 4" stroke-width="1.5"/>
  <text x="470" y="320" text-anchor="middle" font-size="11.5" fill="#fbbf24" direction="rtl">نفس الخسارة بنصف الحساب</text>

  <!-- right panel facts -->
  <rect x="660" y="110" width="300" height="300" rx="12" fill="#12151d" stroke="#2a2f3e"/>
  <text x="940" y="140" text-anchor="start" direction="rtl" font-size="15" font-weight="700" fill="#7ee0a8">الحزمة الرابحة 2025</text>
  <text x="940" y="172" text-anchor="start" direction="rtl" font-size="12.5" fill="#cdd5e3">★ Muon (+ weight decay + ضبط مقياس التحديث)</text>
  <text x="940" y="200" text-anchor="start" direction="rtl" font-size="12.5" fill="#cdd5e3">★ μP: ضبط فرط-المعاملات على وكلاء صغار وانقلها</text>
  <text x="940" y="228" text-anchor="start" direction="rtl" font-size="12.5" fill="#cdd5e3">★ FP8 mixed-precision (DeepSeek-V3)</text>
  <text x="940" y="256" text-anchor="start" direction="rtl" font-size="12.5" fill="#cdd5e3">★ جدول WSD (استقرار طويل ثم انحلال)</text>
  <line x1="680" y1="276" x2="940" y2="276" stroke="#2a2f3e"/>
  <text x="940" y="302" text-anchor="start" direction="rtl" font-size="12" fill="#9aa3b2">تحقّق: Moonlight (3B/16B، 5.7T) · Kimi K2</text>
  <text x="940" y="328" text-anchor="start" direction="rtl" font-size="12" fill="#fbbf24">المقايضة: 10–15 ضرب مصفوفات/خطوة (أبطأ قليلًا)</text>
  <text x="940" y="356" text-anchor="start" direction="rtl" font-size="12" fill="#9aa3b2">قوانين القياس: Chinchilla ~20 رمز/معامل</text>
  <text x="940" y="382" text-anchor="start" direction="rtl" font-size="12" fill="#9aa3b2">المقيّد بالبيانات: تكرار ≤4 حقب ≈ مجاني</text>
</svg>
