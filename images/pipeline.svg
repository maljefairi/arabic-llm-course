<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="'Segoe UI',Tahoma,'Noto Kufi Arabic','Cairo',sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6ea8fe"/>
    </marker>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6ea8fe"/><stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="560" fill="#0f1117"/>
  <text x="600" y="44" text-anchor="middle" direction="rtl" font-size="26" font-weight="700" fill="#ffffff">دورة حياة بناء نموذج اللغة — من البداية إلى النهاية</text>
  <text x="600" y="74" text-anchor="middle" font-size="14" fill="#9aa3b2">End-to-End LLM Build Pipeline (14 stages)</text>

  <!-- stages: 14 boxes in 2 snaking rows of 7 -->
  <g font-size="13.5" fill="#e7e9ee" text-anchor="middle">
    <!-- row 1 (left->right) -->
    <g>
      <rect x="20"  y="120" width="150" height="64" rx="11" fill="#171a23" stroke="#2a2f3e"/>
      <rect x="186" y="120" width="150" height="64" rx="11" fill="#171a23" stroke="#2a2f3e"/>
      <rect x="352" y="120" width="150" height="64" rx="11" fill="#171a23" stroke="#2a2f3e"/>
      <rect x="518" y="120" width="150" height="64" rx="11" fill="#171a23" stroke="#2a2f3e"/>
      <rect x="684" y="120" width="150" height="64" rx="11" fill="#171a23" stroke="#2a2f3e"/>
      <rect x="850" y="120" width="150" height="64" rx="11" fill="#171a23" stroke="#2a2f3e"/>
      <rect x="1016" y="120" width="150" height="64" rx="11" fill="#171a23" stroke="#2a2f3e"/>
    </g>
    <text x="95"  y="148" direction="rtl">① المعمارية</text><text x="95"  y="168" font-size="11" fill="#9aa3b2">Architecture</text>
    <text x="261" y="148" direction="rtl">② الترميز</text><text x="261" y="168" font-size="11" fill="#9aa3b2">Tokenization</text>
    <text x="427" y="148" direction="rtl">③ جمع البيانات</text><text x="427" y="168" font-size="11" fill="#9aa3b2">Sourcing</text>
    <text x="593" y="148" direction="rtl">④ التصفية</text><text x="593" y="168" font-size="11" fill="#9aa3b2">Filtering</text>
    <text x="759" y="148" direction="rtl">⑤ إزالة التكرار</text><text x="759" y="168" font-size="11" fill="#9aa3b2">Dedup</text>
    <text x="925" y="148" direction="rtl">⑥ التصفية النوعية</text><text x="925" y="168" font-size="11" fill="#9aa3b2">Quality</text>
    <text x="1091" y="148" direction="rtl">⑦ بيانات اصطناعية</text><text x="1091" y="168" font-size="11" fill="#9aa3b2">Synthetic</text>

    <!-- row 2 -->
    <g>
      <rect x="20"  y="300" width="150" height="64" rx="11" fill="#171a23" stroke="#2a2f3e"/>
      <rect x="186" y="300" width="150" height="64" rx="11" fill="#171a23" stroke="#2a2f3e"/>
      <rect x="352" y="300" width="150" height="64" rx="11" fill="#171a23" stroke="#2a2f3e"/>
      <rect x="518" y="300" width="150" height="64" rx="11" fill="#171a23" stroke="#2a2f3e"/>
      <rect x="684" y="300" width="150" height="64" rx="11" fill="#171a23" stroke="#2a2f3e"/>
      <rect x="850" y="300" width="150" height="64" rx="11" fill="#171a23" stroke="#2a2f3e"/>
      <rect x="1016" y="300" width="150" height="64" rx="11" fill="#1d2130" stroke="#34d399"/>
    </g>
    <text x="95"  y="328" direction="rtl">⑧ خلط البيانات</text><text x="95"  y="348" font-size="11" fill="#9aa3b2">Mixing</text>
    <text x="261" y="328" direction="rtl">⑨ المنهج والتلدين</text><text x="261" y="348" font-size="11" fill="#9aa3b2">Curriculum</text>
    <text x="427" y="328" direction="rtl">⑩ المحسّن</text><text x="427" y="348" font-size="11" fill="#9aa3b2">Optimizer</text>
    <text x="593" y="328" direction="rtl">⑪ تدريب موزّع</text><text x="593" y="348" font-size="11" fill="#9aa3b2">Distributed</text>
    <text x="759" y="328" direction="rtl">⑫ المحاذاة</text><text x="759" y="348" font-size="11" fill="#9aa3b2">Alignment</text>
    <text x="925" y="328" direction="rtl">⑬ التقييم</text><text x="925" y="348" font-size="11" fill="#9aa3b2">Eval</text>
    <text x="1091" y="328" direction="rtl">⑭ النشر</text><text x="1091" y="348" font-size="11" fill="#34d399">Serving</text>
  </g>

  <!-- arrows row1 -->
  <g stroke="#6ea8fe" stroke-width="2" marker-end="url(#arr)" fill="none">
    <line x1="170" y1="152" x2="184" y2="152"/><line x1="336" y1="152" x2="350" y2="152"/>
    <line x1="502" y1="152" x2="516" y2="152"/><line x1="668" y1="152" x2="682" y2="152"/>
    <line x1="834" y1="152" x2="848" y2="152"/><line x1="1000" y1="152" x2="1014" y2="152"/>
    <!-- wrap down -->
    <path d="M1091,184 L1091,250 L95,250 L95,298"/>
    <!-- arrows row2 -->
    <line x1="170" y1="332" x2="184" y2="332"/><line x1="336" y1="332" x2="350" y2="332"/>
    <line x1="502" y1="332" x2="516" y2="332"/><line x1="668" y1="332" x2="682" y2="332"/>
    <line x1="834" y1="332" x2="848" y2="332"/><line x1="1000" y1="332" x2="1014" y2="332"/>
  </g>

  <!-- phase legend -->
  <g font-size="13" direction="rtl">
    <rect x="20" y="430" width="1146" height="100" rx="12" fill="#12151d" stroke="#2a2f3e"/>
    <text x="1150" y="458" text-anchor="start" direction="rtl" font-size="15" font-weight="700" fill="#cdd5e3">المبدأ المحوري: حلقة المقارنة التجريبية (Ablation Loop)</text>
    <text x="1150" y="486" text-anchor="start" direction="rtl" fill="#9aa3b2">غيّر شيئًا واحدًا ← درّب نموذجًا صغيرًا وكيلاً ← قِس على حزمة تقييم ثابتة ← احتفظ بالأفضل ← كرّر.</text>
    <text x="1150" y="512" text-anchor="start" direction="rtl" fill="#9aa3b2">البيانات صارت الرافعة الأساسية للجودة — لا المعمارية. كل قرار يُثبَت تجريبيًا قبل التوسعة.</text>
  </g>
</svg>
