  <text x="600" y="266" text-anchor="middle" direction="rtl" font-size="18" fill="#8aa0c0">٢٤ فصلاً · ١٢٢ ألف كلمة · ١٦٦ مثال PyTorch · بدائل ومبرّرات لكل خيار</text>
  <text x="600" y="305" text-anchor="middle" font-size="15" fill="#6b7689">Architecture · Tokenization · Data · Training · Alignment · Serving</text>
