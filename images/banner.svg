<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="'Segoe UI',Tahoma,'Noto Kufi Arabic','Cairo',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1117"/>
      <stop offset="0.55" stop-color="#141228"/>
      <stop offset="1" stop-color="#1a1430"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6ea8fe"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#6ea8fe" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#6ea8fe" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#glow)"/>
  <!-- decorative neural net -->
  <g stroke="#2a2f3e" stroke-width="1.2" opacity="0.7">
    <line x1="90" y1="80" x2="180" y2="140"/><line x1="90" y1="80" x2="180" y2="220"/>
    <line x1="90" y1="180" x2="180" y2="140"/><line x1="90" y1="180" x2="180" y2="220"/>
    <line x1="90" y1="280" x2="180" y2="220"/><line x1="180" y1="140" x2="270" y2="180"/>
    <line x1="180" y1="220" x2="270" y2="180"/>
    <line x1="1110" y1="80" x2="1020" y2="140"/><line x1="1110" y1="80" x2="1020" y2="220"/>
    <line x1="1110" y1="180" x2="1020" y2="140"/><line x1="1110" y1="180" x2="1020" y2="220"/>
    <line x1="1110" y1="280" x2="1020" y2="220"/><line x1="1020" y1="140" x2="930" y2="180"/>
    <line x1="1020" y1="220" x2="930" y2="180"/>
  </g>
  <g fill="#6ea8fe">
