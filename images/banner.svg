  <text x="600" y="150" text-anchor="middle" direction="rtl" font-size="46" font-weight="700" fill="#ffffff">الدليل الكامل لبناء نماذج اللغة الكبيرة</text>
  <text x="600" y="200" text-anchor="middle" direction="rtl" font-size="25" fill="#c7cdda">من الصفر إلى أحدث المستويات (SOTA)</text>
