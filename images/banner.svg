    <circle cx="180" cy="140" r="6"/><circle cx="180" cy="220" r="6"/><circle cx="270" cy="180" r="7" fill="#8b5cf6"/>
    <circle cx="1110" cy="80" r="6"/><circle cx="1110" cy="180" r="6"/><circle cx="1110" cy="280" r="6"/>
    <circle cx="1020" cy="140" r="6"/><circle cx="1020" cy="220" r="6"/><circle cx="930" cy="180" r="7" fill="#8b5cf6"/>
