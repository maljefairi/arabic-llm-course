<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="'Segoe UI',Tahoma,'Noto Kufi Arabic','Cairo',sans-serif">
  <defs><marker id="d_a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6ea8fe"/></marker></defs>
  <rect width="1000" height="460" fill="#0f1117"/>
  <text x="500" y="40" text-anchor="middle" direction="rtl" font-size="24" font-weight="700" fill="#fff">إزالة التكرار الضبابية: MinHash + LSH</text>
  <text x="500" y="66" text-anchor="middle" font-size="13" fill="#9aa3b2">تشابه Jaccard تقريبي على n-gram shingles — معيار النطاق الواسع</text>

  <g text-anchor="middle" font-size="12.5">
    <!-- docs -->
    <rect x="40" y="110" width="150" height="40" rx="8" fill="#171a23" stroke="#2a2f3e"/><text x="115" y="135" direction="rtl" fill="#e7e9ee">مستند A</text>
    <rect x="40" y="160" width="150" height="40" rx="8" fill="#171a23" stroke="#2a2f3e"/><text x="115" y="185" direction="rtl" fill="#e7e9ee">مستند A′ (شبه مكرّر)</text>
    <rect x="40" y="260" width="150" height="40" rx="8" fill="#171a23" stroke="#2a2f3e"/><text x="115" y="285" direction="rtl" fill="#e7e9ee">مستند B</text>

    <!-- shingles -> minhash -->
    <rect x="250" y="120" width="170" height="80" rx="9" fill="#12151d" stroke="#6ea8fe"/>
    <text x="335" y="148" direction="rtl" fill="#9fc1ff">Shingles → MinHash</text>
    <text x="335" y="172" font-size="11" fill="#9aa3b2">توقيع مضغوط لكل مستند</text>
    <rect x="250" y="260" width="170" height="50" rx="9" fill="#12151d" stroke="#6ea8fe"/>
    <text x="335" y="290" direction="rtl" fill="#9fc1ff">MinHash</text>

    <line x1="190" y1="155" x2="248" y2="150" stroke="#6ea8fe" stroke-width="1.8" marker-end="url(#d_a)"/>
    <line x1="190" y1="180" x2="248" y2="172" stroke="#6ea8fe" stroke-width="1.8" marker-end="url(#d_a)"/>
    <line x1="190" y1="280" x2="248" y2="285" stroke="#6ea8fe" stroke-width="1.8" marker-end="url(#d_a)"/>

    <!-- LSH buckets -->
    <rect x="480" y="100" width="200" height="130" rx="10" fill="#16261c" stroke="#34d399"/>
    <text x="580" y="126" direction="rtl" fill="#7ee0a8" font-weight="700">دلو LSH ①</text>
    <rect x="500" y="138" width="160" height="32" rx="6" fill="#0f1f17"/><text x="580" y="159" direction="rtl" fill="#cdd5e3">A</text>
    <rect x="500" y="176" width="160" height="32" rx="6" fill="#0f1f17"/><text x="580" y="197" direction="rtl" fill="#cdd5e3">A′</text>
    <text x="580" y="222" font-size="10.5" fill="#7ee0a8" direction="rtl">→ نفس الدلو = شبه مكرّر</text>

    <rect x="480" y="250" width="200" height="70" rx="10" fill="#1a1118" stroke="#3a2330"/>
    <text x="580" y="276" direction="rtl" fill="#9aa3b2" font-weight="700">دلو LSH ②</text>
    <rect x="500" y="286" width="160" height="28" rx="6" fill="#1f0f14"/><text x="580" y="305" direction="rtl" fill="#cdd5e3">B (فريد)</text>

    <line x1="420" y1="160" x2="478" y2="160" stroke="#34d399" stroke-width="1.8" marker-end="url(#d_a)"/>
    <line x1="420" y1="285" x2="478" y2="285" stroke="#6ea8fe" stroke-width="1.8" marker-end="url(#d_a)"/>

    <!-- result -->
    <rect x="740" y="150" width="220" height="120" rx="11" fill="#12151d" stroke="#8b5cf6"/>
    <text x="850" y="180" direction="rtl" fill="#b79bff" font-weight="700">النتيجة: أبقِ نسخة واحدة</text>
    <rect x="780" y="196" width="140" height="32" rx="6" fill="#1a1726"/><text x="850" y="217" direction="rtl" fill="#cdd5e3">A ✓</text>
    <rect x="780" y="232" width="140" height="30" rx="6" fill="#0f1f17"/><text x="850" y="252" direction="rtl" fill="#7ee0a8">B ✓</text>
    <line x1="680" y1="180" x2="738" y2="200" stroke="#8b5cf6" stroke-width="1.8" marker-end="url(#d_a)"/>
  </g>

  <text x="960" y="372" text-anchor="start" direction="rtl" font-size="13" fill="#cdd5e3">التدرّج: دقيق (exact) → MinHash/LSH → Bloom (فوق 10TB) → دلالي SemDeDup / D4</text>
  <text x="960" y="400" text-anchor="start" direction="rtl" font-size="12.5" fill="#9aa3b2">لماذا حرج؟ يهدر الحساب · يشوّه التوزيع · يغذّي الحفظ (memorization)</text>
  <text x="960" y="426" text-anchor="start" direction="rtl" font-size="12" fill="#fbbf24">فخ: الإزالة العدوانية عبر كل اللقطات قد تترك بقايا أقل جودة — أزِل لكل-لقطة أولًا.</text>
</svg>
