<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="'Segoe UI',Tahoma,'Noto Kufi Arabic','Cairo',sans-serif">
  <rect width="1000" height="470" fill="#0f1117"/>
  <text x="500" y="40" text-anchor="middle" direction="rtl" font-size="24" font-weight="700" fill="#fff">قمع التصفية النوعية بالنماذج</text>
  <text x="500" y="66" text-anchor="middle" font-size="13" fill="#9aa3b2">من محيط خام هائل إلى أعلى ~10% جودةً (مصنّف fastText / FineWeb-Edu)</text>

  <!-- funnel layers -->
  <g text-anchor="middle">
    <polygon points="120,100 880,100 800,160 200,160" fill="#1d2130" stroke="#2a2f3e"/>
    <text x="500" y="135" direction="rtl" font-size="14" fill="#cdd5e3">محيط خام · DCLM-POOL ≈ 240T رمز</text>

    <polygon points="200,170 800,170 740,225 260,225" fill="#1a2030" stroke="#3a4150"/>
    <text x="500" y="202" direction="rtl" font-size="13" fill="#9fc1ff">+ استخراج جيد + تصفية تجريبية + إزالة تكرار</text>

    <polygon points="260,235 740,235 690,290 310,290" fill="#172033" stroke="#6ea8fe"/>
    <text x="500" y="267" direction="rtl" font-size="13" fill="#9fc1ff">+ مصنّف نوعي (إيجابيات = نصوص تعليمات/تعليمية)</text>

    <polygon points="310,300 690,300 640,355 360,355" fill="#16261c" stroke="#34d399"/>
    <text x="500" y="332" direction="rtl" font-size="13.5" font-weight="700" fill="#7ee0a8">أعلى ~10% · بيانات عالية الجودة</text>

    <rect x="430" y="368" width="140" height="40" rx="9" fill="#1a1726" stroke="#8b5cf6"/>
    <text x="500" y="393" direction="rtl" font-size="13" fill="#b79bff">تدريب النموذج</text>
  </g>

  <!-- side facts -->
  <text x="40" y="120" direction="rtl" font-size="12" fill="#7ee0a8">DCLM: 7B@2.6T → 64% MMLU</text>
  <text x="40" y="140" direction="rtl" font-size="11" fill="#9aa3b2">+6.6 نقطة بحساب أقل 40%</text>

  <text x="960" y="430" text-anchor="end" direction="rtl" font-size="12.5" fill="#fbbf24">تحذيران: التصفية تزيل ~90% (تجوّع التشغيلات الطويلة) · «وهم الجودة» = محاذاة للمهمة لا جودة جوهرية</text>
  <text x="960" y="452" text-anchor="end" direction="rtl" font-size="12" fill="#9aa3b2">الحل: تجميع مصنّفات (Nemotron-CC) + بيانات اصطناعية لاستعادة الرموز المفقودة</text>
</svg>
