<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 640" font-family="'Segoe UI',Tahoma,'Noto Kufi Arabic','Cairo',sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6ea8fe"/></marker>
  </defs>
  <rect width="760" height="640" fill="#0f1117"/>
  <text x="380" y="40" text-anchor="middle" direction="rtl" font-size="23" font-weight="700" fill="#ffffff">كتلة المُحوِّل الحديثة (Decoder Block)</text>
  <text x="380" y="66" text-anchor="middle" font-size="13" fill="#9aa3b2">Pre-Norm · RoPE · RMSNorm · SwiGLU · Residual</text>

  <!-- container -->
  <rect x="170" y="95" width="420" height="470" rx="16" fill="#12151d" stroke="#2a2f3e"/>

  <!-- input -->
  <rect x="300" y="585" width="160" height="40" rx="9" fill="#171a23" stroke="#2a2f3e"/>
  <text x="380" y="610" text-anchor="middle" direction="rtl" font-size="13" fill="#e7e9ee">الدخل x</text>

  <!-- sub-block 1: attention -->
  <rect x="210" y="430" width="340" height="44" rx="9" fill="#1d2130" stroke="#6ea8fe"/>
  <text x="380" y="458" text-anchor="middle" direction="rtl" font-size="13" fill="#9fc1ff">RMSNorm</text>
  <rect x="210" y="360" width="340" height="56" rx="9" fill="#172033" stroke="#6ea8fe"/>
  <text x="380" y="384" text-anchor="middle" direction="rtl" font-size="14" font-weight="700" fill="#6ea8fe">انتباه ذاتي سببي + RoPE</text>
  <text x="380" y="404" text-anchor="middle" font-size="11" fill="#9aa3b2">Causal Self-Attention (GQA / MLA)</text>

  <!-- residual 1 -->
  <circle cx="380" cy="318" r="16" fill="#171a23" stroke="#34d399"/>
  <text x="380" y="323" text-anchor="middle" font-size="16" fill="#34d399">+</text>
  <path d="M610,607 L660,607 L660,318 L398,318" fill="none" stroke="#34d399" stroke-width="1.6" marker-end="url(#ar)" opacity="0.9"/>
  <text x="668" y="470" font-size="10.5" fill="#34d399" direction="rtl" transform="rotate(90 668 470)">residual</text>

  <!-- sub-block 2: ffn -->
  <rect x="210" y="245" width="340" height="44" rx="9" fill="#1d2130" stroke="#8b5cf6"/>
  <text x="380" y="273" text-anchor="middle" direction="rtl" font-size="13" fill="#b79bff">RMSNorm</text>
  <rect x="210" y="175" width="340" height="56" rx="9" fill="#1a1726" stroke="#8b5cf6"/>
  <text x="380" y="199" text-anchor="middle" direction="rtl" font-size="14" font-weight="700" fill="#b79bff">تغذية أمامية SwiGLU</text>
  <text x="380" y="219" text-anchor="middle" font-size="11" fill="#9aa3b2">FFN: SwiGLU(x) (أو طبقة MoE)</text>

  <!-- residual 2 -->
  <circle cx="380" cy="133" r="16" fill="#171a23" stroke="#34d399"/>
  <text x="380" y="138" text-anchor="middle" font-size="16" fill="#34d399">+</text>
  <path d="M120,318 L120,133 L362,133" fill="none" stroke="#34d399" stroke-width="1.6" marker-end="url(#ar)" opacity="0.9"/>

  <!-- output -->
  <rect x="300" y="95" width="160" height="22" rx="6" fill="#171a23" stroke="#2a2f3e"/>
  <text x="380" y="111" text-anchor="middle" direction="rtl" font-size="11.5" fill="#9aa3b2">→ الكتلة التالية × N</text>

  <!-- flow arrows -->
  <g stroke="#6ea8fe" stroke-width="2" fill="none" marker-end="url(#ar)">
    <line x1="380" y1="585" x2="380" y2="476"/>
    <line x1="380" y1="430" x2="380" y2="418"/>
    <line x1="380" y1="360" x2="380" y2="336"/>
    <line x1="380" y1="302" x2="380" y2="291"/>
    <line x1="380" y1="245" x2="380" y2="233"/>
    <line x1="380" y1="175" x2="380" y2="151"/>
    <line x1="380" y1="117" x2="380" y2="117"/>
  </g>

  <!-- side notes -->
  <g direction="rtl" font-size="12" fill="#9aa3b2">
    <text x="40" y="200">RMSNorm بدل LayerNorm:</text>
    <text x="40" y="220" font-size="11">أرخص وأكثر استقرارًا</text>
    <text x="40" y="395">RoPE بدل المطلق:</text>
    <text x="40" y="415" font-size="11">يعمّم لأطوال أطول</text>
  </g>
</svg>
