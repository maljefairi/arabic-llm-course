<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="'Segoe UI',Tahoma,'Noto Kufi Arabic','Cairo',sans-serif">
  <defs><marker id="t_a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6ea8fe"/></marker></defs>
  <rect width="1000" height="440" fill="#0f1117"/>
  <text x="500" y="40" text-anchor="middle" direction="rtl" font-size="24" font-weight="700" fill="#fff">الترميز بأزواج البايت (Byte-Pair Encoding)</text>
  <text x="500" y="66" text-anchor="middle" font-size="13" fill="#9aa3b2">دمج تكراري لأكثر الأزواج شيوعًا → وحدات فرعية (subwords)</text>

  <g text-anchor="middle" font-size="14">
    <!-- step 0 chars -->
    <text x="120" y="115" direction="rtl" fill="#9aa3b2" font-size="12">١) حروف</text>
    <g fill="#171a23" stroke="#2a2f3e"><rect x="40" y="125" width="26" height="30" rx="5"/><rect x="70" y="125" width="26" height="30" rx="5"/><rect x="100" y="125" width="26" height="30" rx="5"/><rect x="130" y="125" width="26" height="30" rx="5"/><rect x="160" y="125" width="26" height="30" rx="5"/></g>
    <g fill="#e7e9ee" font-size="13"><text x="53" y="145">l</text><text x="83" y="145">o</text><text x="113" y="145">w</text><text x="143" y="145">e</text><text x="173" y="145">r</text></g>

    <!-- step1 merge lo -->
    <text x="430" y="115" direction="rtl" fill="#9aa3b2" font-size="12">٢) دمج (l,o)→lo</text>
    <g fill="#16261c" stroke="#34d399"><rect x="340" y="125" width="46" height="30" rx="5"/></g>
    <g fill="#171a23" stroke="#2a2f3e"><rect x="390" y="125" width="26" height="30" rx="5"/><rect x="420" y="125" width="26" height="30" rx="5"/><rect x="450" y="125" width="26" height="30" rx="5"/></g>
    <g fill="#e7e9ee" font-size="13"><text x="363" y="145" fill="#7ee0a8">lo</text><text x="403" y="145">w</text><text x="433" y="145">e</text><text x="463" y="145">r</text></g>

    <!-- step2 merge low / er -->
    <text x="760" y="115" direction="rtl" fill="#9aa3b2" font-size="12">٣) ...→ low + er</text>
    <g fill="#16261c" stroke="#34d399"><rect x="690" y="125" width="56" height="30" rx="5"/><rect x="752" y="125" width="46" height="30" rx="5"/></g>
    <g fill="#e7e9ee" font-size="13"><text x="718" y="145" fill="#7ee0a8">low</text><text x="775" y="145" fill="#7ee0a8">er</text></g>

    <line x1="200" y1="140" x2="334" y2="140" stroke="#6ea8fe" stroke-width="2" marker-end="url(#t_a)"/>
    <line x1="490" y1="140" x2="684" y2="140" stroke="#6ea8fe" stroke-width="2" marker-end="url(#t_a)"/>
  </g>

  <!-- byte-level note + vocab law -->
  <rect x="40" y="210" width="440" height="180" rx="12" fill="#12151d" stroke="#2a2f3e"/>
  <text x="450" y="238" text-anchor="end" direction="rtl" font-size="15" font-weight="700" fill="#9fc1ff">على مستوى البايت (BBPE) ★</text>
  <text x="450" y="266" text-anchor="end" direction="rtl" font-size="12.5" fill="#cdd5e3">يعمل على البايتات الخام → لا مشكلة «خارج المفردات» (OOV)</text>
  <text x="450" y="290" text-anchor="end" direction="rtl" font-size="12.5" fill="#cdd5e3">يتعامل مع أي لغة ورمز وإيموجي وكود</text>
  <text x="450" y="320" text-anchor="end" direction="rtl" font-size="13" fill="#9aa3b2">البدائل: WordPiece · Unigram (SentencePiece)</text>
  <text x="450" y="356" text-anchor="end" direction="rtl" font-size="12.5" fill="#7ee0a8">حِيَل: تقسيم الأرقام لخانات · رموز مسافات للكود · حجم ÷128</text>

  <rect x="520" y="210" width="440" height="180" rx="12" fill="#12151d" stroke="#2a2f3e"/>
  <text x="940" y="238" text-anchor="end" direction="rtl" font-size="15" font-weight="700" fill="#b79bff">قانون حجم المفردات</text>
  <text x="940" y="264" text-anchor="end" direction="rtl" font-size="12.5" fill="#cdd5e3">الحجم الأمثل يكبر مع حجم النموذج</text>
  <!-- mini chart -->
  <line x1="560" y1="370" x2="930" y2="370" stroke="#2a2f3e"/><line x1="560" y1="290" x2="560" y2="370" stroke="#2a2f3e"/>
  <polyline points="560,360 650,340 760,315 930,300" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="600" y="388" font-size="10.5" fill="#9aa3b2">حجم النموذج →</text>
  <text x="940" y="300" text-anchor="end" font-size="11" fill="#b79bff" direction="rtl">128K–250K حديثًا</text>
  <text x="555" y="296" text-anchor="end" font-size="10.5" fill="#9aa3b2">vocab</text>
</svg>
