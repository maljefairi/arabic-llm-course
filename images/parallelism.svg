<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="'Segoe UI',Tahoma,'Noto Kufi Arabic','Cairo',sans-serif">
  <rect width="1100" height="500" fill="#0f1117"/>
  <text x="550" y="40" text-anchor="middle" direction="rtl" font-size="24" font-weight="700" fill="#fff">التدريب الموزّع — كيف تُدرّب نموذجًا لا يسع بطاقة واحدة</text>
  <text x="550" y="66" text-anchor="middle" font-size="13" fill="#9aa3b2">أنواع التوازي تُدمج معًا (3D/4D parallelism)</text>

  <g text-anchor="middle" font-size="12">
    <!-- DP -->
    <rect x="40" y="100" width="240" height="170" rx="12" fill="#12151d" stroke="#6ea8fe"/>
    <text x="160" y="126" direction="rtl" font-size="14" font-weight="700" fill="#9fc1ff">توازي البيانات (DP)</text>
    <g fill="#172033" stroke="#6ea8fe"><rect x="70" y="145" width="80" height="50" rx="7"/><rect x="170" y="145" width="80" height="50" rx="7"/></g>
    <text x="110" y="175" fill="#cdd5e3">GPU0</text><text x="210" y="175" fill="#cdd5e3">GPU1</text>
    <text x="160" y="220" direction="rtl" font-size="11" fill="#9aa3b2">نسخة كاملة لكل بطاقة</text>
    <text x="160" y="240" direction="rtl" font-size="11" fill="#9aa3b2">دفعات مختلفة + all-reduce</text>
    <text x="160" y="258" direction="rtl" font-size="10.5" fill="#fbbf24">المشكلة: تكرار الحالة</text>

    <!-- FSDP/ZeRO -->
    <rect x="300" y="100" width="240" height="170" rx="12" fill="#12151d" stroke="#34d399"/>
    <text x="420" y="126" direction="rtl" font-size="14" font-weight="700" fill="#7ee0a8">FSDP / ZeRO ★</text>
    <g fill="#16261c" stroke="#34d399"><rect x="330" y="145" width="55" height="50" rx="7"/><rect x="392" y="145" width="55" height="50" rx="7"/><rect x="454" y="145" width="55" height="50" rx="7"/></g>
    <text x="357" y="175" font-size="10" fill="#7ee0a8">شظية</text><text x="419" y="175" font-size="10" fill="#7ee0a8">شظية</text><text x="481" y="175" font-size="10" fill="#7ee0a8">شظية</text>
    <text x="420" y="220" direction="rtl" font-size="11" fill="#9aa3b2">تقسيم المعاملات + التدرّجات</text>
    <text x="420" y="240" direction="rtl" font-size="11" fill="#9aa3b2">+ حالات المحسّن عبر البطاقات</text>
    <text x="420" y="258" direction="rtl" font-size="10.5" fill="#7ee0a8">يوفّر ذاكرة هائلة (ZeRO-1/2/3)</text>

    <!-- TP -->
    <rect x="560" y="100" width="240" height="170" rx="12" fill="#12151d" stroke="#8b5cf6"/>
    <text x="680" y="126" direction="rtl" font-size="14" font-weight="700" fill="#b79bff">توازي الموتّر (TP)</text>
    <rect x="600" y="145" width="160" height="50" rx="7" fill="#1a1726" stroke="#8b5cf6"/>
    <line x1="680" y1="145" x2="680" y2="195" stroke="#8b5cf6" stroke-dasharray="3 3"/>
    <text x="640" y="175" font-size="10" fill="#b79bff">½ طبقة</text><text x="720" y="175" font-size="10" fill="#b79bff">½ طبقة</text>
    <text x="680" y="220" direction="rtl" font-size="11" fill="#9aa3b2">تقسيم الطبقة الواحدة (Megatron)</text>
    <text x="680" y="240" direction="rtl" font-size="11" fill="#9aa3b2">عبر عدة بطاقات</text>

    <!-- PP -->
    <rect x="820" y="100" width="240" height="170" rx="12" fill="#12151d" stroke="#fbbf24"/>
    <text x="940" y="126" direction="rtl" font-size="14" font-weight="700" fill="#fbbf24">توازي خط الأنابيب (PP)</text>
    <g fill="#241f10" stroke="#fbbf24"><rect x="850" y="145" width="60" height="50" rx="7"/><rect x="920" y="145" width="60" height="50" rx="7"/><rect x="990" y="145" width="60" height="50" rx="7"/></g>
    <text x="880" y="175" font-size="10" fill="#fbbf24">طبقات 1-8</text><text x="950" y="175" font-size="9" fill="#fbbf24">9-16</text><text x="1020" y="175" font-size="9" fill="#fbbf24">17-24</text>
    <text x="940" y="220" direction="rtl" font-size="11" fill="#9aa3b2">مراحل متتابعة + جدولة 1F1B</text>
    <text x="940" y="240" direction="rtl" font-size="10.5" fill="#fbbf24">الانتباه لفقاعة الـ pipeline</text>
  </g>

  <!-- memory savings row -->
  <rect x="40" y="300" width="1020" height="160" rx="12" fill="#12151d" stroke="#2a2f3e"/>
  <text x="1030" y="328" text-anchor="end" direction="rtl" font-size="15" font-weight="700" fill="#cdd5e3">توفير الذاكرة + الأدوات</text>
  <g direction="rtl" font-size="12.5" fill="#cdd5e3">
    <text x="1030" y="356" text-anchor="end">• إعادة حساب التنشيط (activation/gradient checkpointing) — مقايضة حساب مقابل ذاكرة</text>
    <text x="1030" y="380" text-anchor="end">• الدقة المختلطة bf16/fp16/fp8 · تراكم التدرّج (gradient accumulation) · تفريغ المحسّن (offload)</text>
    <text x="1030" y="404" text-anchor="end">• توازي الخبراء (EP) لـ MoE عبر توجيه all-to-all</text>
    <text x="1030" y="428" text-anchor="end" fill="#7ee0a8">الأدوات: PyTorch FSDP · DeepSpeed · Megatron-LM — والهدف رفع معدّل استخدام النموذج (MFU)</text>
  </g>
</svg>
